services:
  db:
    image: postgres:17
    container_name: paperclip-db
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: paperclip
      POSTGRES_DB: paperclip
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - /Volumes/Dom-Cache/paperclip-db:/var/lib/postgresql/data
    networks:
      - paperclip-internal

  server:
    build:
      context: ..
      dockerfile: Dockerfile
    image: paperclip-paperclip:latest
    container_name: paperclip
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g
    environment:
      DATABASE_URL: postgres://paperclip:paperclip@db:5432/paperclip
      PORT: "3100"
      SERVE_UI: "true"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-https://paperclip.fabfunds.app}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
      PAPERCLIP_AGENT_JWT_SECRET: "${PAPERCLIP_AGENT_JWT_SECRET:?PAPERCLIP_AGENT_JWT_SECRET must be set}"
    volumes:
      - ~/paperclip-data:/paperclip
      - ~/.claude:/root/.claude:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - paperclip-internal
      - tunnel-proxy

networks:
  paperclip-internal:
    name: paperclip-internal
    driver: bridge
  tunnel-proxy:
    external: true

# volumes: bind mounts used instead of named volumes (data lives on Dom-Cache and ~/paperclip-data)
